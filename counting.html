<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#002855">
<title>Stock Count</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #F4F6FA;
  color: #0D1B2A;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #002855, #00509E);
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,40,85,0.2);
  position: sticky; top: 0; z-index: 100;
}
.header-brand { color: #fff; font-size: 1.1rem; font-weight: 700; }
.header-brand span { color: #5BC4FF; }
.header-right { display: flex; align-items: center; gap: 8px; }
.header-sid {
  background: rgba(91,196,255,0.18); border: 1px solid rgba(91,196,255,0.4);
  border-radius: 999px; padding: 4px 12px; color: #5BC4FF;
  font-size: 0.72rem; font-weight: 600; font-family: 'DM Mono', monospace;
  max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.header-user {
  background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.28);
  border-radius: 999px; padding: 4px 12px; color: #fff;
  font-size: 0.72rem; font-weight: 500; font-family: 'DM Mono', monospace;
}

/* ── SYNC BAR ── */
.sync-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: #fff; border-bottom: 1px solid #E2E8F0;
  font-size: 0.78rem; color: #5A6A7A;
}
.sync-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; margin-right: 6px;
}
.dot-ok      { background: #10B981; }
.dot-pending { background: #F59E0B; }
.dot-syncing { background: #3B82F6; animation: pulse 1s infinite; }
.dot-offline { background: #9CA3AF; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.sync-btn {
  background: #002855; color: #fff; border: none;
  border-radius: 8px; padding: 5px 14px; font-size: 0.76rem;
  font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
}
.sync-btn:active { opacity: 0.8; }

/* ── CONTAINER ── */
.container { padding: 16px; max-width: 600px; margin: 0 auto; }

/* ── OVERVIEW CARD ── */
.card {
  background: #fff; border: 1px solid #E2E8F0;
  border-radius: 16px; padding: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  margin-bottom: 14px;
}
.section-label {
  font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.2px; color: #8A9BAE; margin-bottom: 12px;
}
.stats-row { display: flex; gap: 10px; margin-bottom: 12px; }
.stat-box {
  flex: 1; background: #F4F6FA; border: 1px solid #E2E8F0;
  border-radius: 12px; padding: 12px 8px; text-align: center;
}
.stat-label { font-size: 0.63rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #8A9BAE; margin-bottom: 4px; }
.stat-value { font-size: 1.6rem; font-weight: 700; color: #002855; line-height: 1; }
.stat-value.red { color: #DC2626; }

.progress-wrap { margin-top: 4px; }
.progress-head {
  display: flex; justify-content: space-between;
  font-size: 0.74rem; color: #8A9BAE; margin-bottom: 5px;
}
.progress-head b { color: #002855; }
.progress-track { background: #E2E8F0; border-radius: 999px; height: 7px; overflow: hidden; }
.progress-fill  { background: linear-gradient(90deg, #002855, #5BC4FF); height: 100%; border-radius: 999px; transition: width 0.4s ease; }

/* ── SEARCH ── */
.search-wrap { position: relative; margin-bottom: 12px; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }
#searchInput {
  width: 100%; padding: 12px 14px 12px 42px;
  border: 1.5px solid #CBD5E0; border-radius: 12px;
  font-family: 'DM Sans', sans-serif; font-size: 1rem;
  background: #F8FAFC; color: #0D1B2A; outline: none;
  -webkit-appearance: none;
}
#searchInput:focus { border-color: #00509E; box-shadow: 0 0 0 3px rgba(0,80,158,0.1); }

/* ── DROPDOWN ── */
#dropdown {
  display: none; background: #fff; border: 1.5px solid #CBD5E0;
  border-radius: 12px; margin-top: 4px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-height: 240px; overflow-y: auto;
}
.drop-item {
  padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #F0F4F8;
  transition: background 0.1s;
}
.drop-item:last-child { border-bottom: none; }
.drop-item:active { background: #EEF2F7; }
.drop-code { font-family: 'DM Mono', monospace; font-size: 0.76rem; color: #8A9BAE; margin-bottom: 2px; }
.drop-name { font-size: 0.9rem; font-weight: 600; color: #0D1B2A; }

/* ── COUNT ENTRY ── */
#countEntry { display: none; margin-top: 12px; }
.entry-divider { border: none; border-top: 1px solid #E2E8F0; margin: 12px 0; }
.entry-row { display: flex; gap: 10px; margin-bottom: 14px; }
.entry-box { flex: 1; }
.entry-label { font-size: 0.63rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #8A9BAE; margin-bottom: 6px; }

.qty-display {
  background: #F4F6FA; border: 1px solid #E2E8F0;
  border-radius: 12px; padding: 14px 8px; text-align: center;
}
.qty-value { font-size: 1.8rem; font-weight: 700; color: #002855; }

#physInput {
  width: 100%; padding: 14px 8px;
  border: 1.5px solid #CBD5E0; border-radius: 12px;
  font-family: 'DM Sans', sans-serif; font-size: 1.8rem; font-weight: 700;
  color: #002855; background: #F8FAFC; text-align: center; outline: none;
  -webkit-appearance: none; -moz-appearance: textfield;
}
#physInput:focus { border-color: #00509E; box-shadow: 0 0 0 3px rgba(0,80,158,0.1); }
#physInput::-webkit-inner-spin-button,
#physInput::-webkit-outer-spin-button { -webkit-appearance: none; }

.variance-box {
  border-radius: 12px; padding: 14px 8px; text-align: center;
  border: 1px solid #E2E8F0; background: #F4F6FA;
  transition: background 0.15s, border-color 0.15s;
}
.variance-box.pos { background: #ECFDF5; border-color: #6EE7B7; }
.variance-box.neg { background: #FEF2F2; border-color: #FCA5A5; }
#varianceVal {
  font-size: 1.8rem; font-weight: 700; color: #0D1B2A;
  transition: color 0.15s;
}
.variance-box.pos #varianceVal { color: #059669; }
.variance-box.neg #varianceVal { color: #DC2626; }

.last-saved { font-size: 0.74rem; color: #8A9BAE; text-align: center; margin-bottom: 10px; }

/* ── SAVE BUTTON ── */
#saveBtn {
  width: 100%; height: 52px;
  background: linear-gradient(135deg, #002855, #00509E);
  color: #fff; border: none; border-radius: 12px;
  font-family: 'DM Sans', sans-serif; font-weight: 700;
  font-size: 1rem; cursor: pointer; letter-spacing: 0.2px;
  box-shadow: 0 4px 16px rgba(0,80,158,0.3);
  transition: transform 0.1s, box-shadow 0.1s;
}
#saveBtn:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(0,80,158,0.2); }
#saveBtn.saving { background: linear-gradient(135deg, #059669, #10B981); }

/* ── RECENT COUNTS ── */
.recent-list { }
.recent-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; background: #F8FAFC; border: 1px solid #E8EDF3;
  border-radius: 10px; margin-bottom: 6px;
}
.recent-name { font-weight: 600; font-size: 0.86rem; }
.recent-meta { font-size: 0.73rem; color: #8A9BAE; margin-top: 1px; }
.badge {
  border-radius: 6px; padding: 3px 10px;
  font-size: 0.76rem; font-weight: 700; font-family: 'DM Mono', monospace;
  white-space: nowrap;
}
.badge-pos  { background: #D1FAE5; color: #065F46; }
.badge-neg  { background: #FEE2E2; color: #991B1B; }
.badge-zero { background: #E2E8F0; color: #374151; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: #0D1B2A; color: #fff; padding: 12px 24px;
  border-radius: 12px; font-size: 0.86rem; font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 999;
  transition: transform 0.3s ease; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── NO DATA STATE ── */
.no-data {
  text-align: center; padding: 60px 20px; color: #8A9BAE;
}
.no-data .icon { font-size: 3rem; margin-bottom: 12px; }
.no-data h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; color: #5A6A7A; }
.no-data p  { font-size: 0.84rem; line-height: 1.5; }
.back-btn {
  display: inline-block; margin-top: 20px;
  background: linear-gradient(135deg, #002855, #00509E);
  color: #fff; text-decoration: none; border-radius: 10px;
  padding: 12px 28px; font-weight: 700; font-size: 0.9rem;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-brand">📦 Stock <span>Count</span></div>
  <div class="header-right">
    <div class="header-sid" id="headerSid">—</div>
    <div class="header-user" id="headerUser">—</div>
  </div>
</div>

<!-- SYNC BAR -->
<div class="sync-bar">
  <span id="syncStatus"><span class="sync-dot dot-ok"></span>All saved locally</span>
  <button class="sync-btn" id="syncBtn" onclick="syncToCloud()">☁️ Sync to Cloud</button>
</div>

<!-- MAIN CONTENT -->
<div class="container" id="mainContent">
  <div class="no-data" id="noDataState">
    <div class="icon">📭</div>
    <h3>No session loaded</h3>
    <p>Go back to Stock Count Pro, open or create a session, then come back here.</p>
    <a href="/" class="back-btn">← Back to Dashboard</a>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  STATE — all in memory + localStorage
// ─────────────────────────────────────────────
let products   = [];
let filtered   = [];
let selected   = null;
let saveCount_counter = 0;
const SYNC_EVERY = 10;

// ─────────────────────────────────────────────
//  INIT — injected data first, localStorage fallback
// ─────────────────────────────────────────────
function init() {
  // window.__SC_* is injected by Streamlit at top of <head>
  const inj = window.__SC_DATA__ && window.__SC_DATA__.length > 0;

  const sid     = inj ? window.__SC_SID__      : localStorage.getItem('sc_sid');
  const user    = inj ? window.__SC_USER__     : localStorage.getItem('sc_user');
  const rawData = inj ? JSON.stringify(window.__SC_DATA__) : localStorage.getItem('sc_data');

  saveCount_counter = parseInt(localStorage.getItem('sc_counter') || '0');

  if (!sid || !rawData) {
    document.getElementById('noDataState').style.display = 'block';
    return;
  }

  // Always write to localStorage so offline works after first load
  localStorage.setItem('sc_sid',  sid);
  localStorage.setItem('sc_user', user || '');
  localStorage.setItem('sc_data', rawData);

  document.getElementById('noDataState').style.display = 'none';
  document.getElementById('headerSid').textContent  = sid;
  document.getElementById('headerUser').textContent = user || '—';

  try {
    products = JSON.parse(rawData);
    products.forEach(p => {
      p['physical count'] = parseInt(p['physical count'])  || 0;
      p['difference']     = parseInt(p['difference'])      || 0;
      p['systems count']  = parseFloat(p['systems count']) || 0;
      p['last_updated']   = p['last_updated'] || '';
      p['product code']   = String(p['product code'] || '');
      p['product name']   = String(p['product name'] || '');
    });
  } catch(e) {
    showToast('Failed to load data: ' + e.message);
    return;
  }

  updateSyncBar();
  renderApp();
}

// ─────────────────────────────────────────────
//  RENDER MAIN APP
// ─────────────────────────────────────────────
function renderApp() {
  const main = document.getElementById('mainContent');
  const total   = products.length;
  const counted = products.filter(p => p['last_updated'] !== '').length;
  const nVars   = products.filter(p => p['difference'] !== 0 && p['last_updated'] !== '').length;
  const pct     = total ? Math.round(counted / total * 100) : 0;

  main.innerHTML = `
    <!-- OVERVIEW -->
    <div class="card">
      <div class="section-label">Overview</div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">Total</div>
          <div class="stat-value">${total}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Counted</div>
          <div class="stat-value">${counted}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Variances</div>
          <div class="stat-value red">${nVars}</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-head"><span>Progress</span><span><b>${pct}%</b> complete</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>

    <!-- COUNT ENTRY -->
    <div class="card">
      <div class="section-label">Enter Count</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Product name or code…"
               oninput="onSearch(this.value)" autocomplete="off" autocorrect="off"
               autocapitalize="off" spellcheck="false">
      </div>
      <div id="dropdown"></div>
      <div id="countEntry"></div>
    </div>

    <!-- RECENT COUNTS -->
    ${renderRecent()}
  `;
}

// ─────────────────────────────────────────────
//  RECENT COUNTS
// ─────────────────────────────────────────────
function renderRecent() {
  const done = products
    .filter(p => p['last_updated'] !== '')
    .sort((a,b) => b['last_updated'].localeCompare(a['last_updated']))
    .slice(0, 8);

  if (!done.length) return '';

  const rows = done.map(p => {
    const d = p['difference'];
    const badge = d > 0
      ? `<span class="badge badge-pos">+${d}</span>`
      : d < 0
        ? `<span class="badge badge-neg">${d}</span>`
        : `<span class="badge badge-zero">±0</span>`;
    return `
      <div class="recent-item">
        <div>
          <div class="recent-name">${p['product name']}</div>
          <div class="recent-meta">${p['product code']} · ${p['last_updated']}</div>
        </div>
        ${badge}
      </div>`;
  }).join('');

  return `
    <div class="card">
      <div class="section-label">Recent Counts</div>
      <div class="recent-list">${rows}</div>
    </div>`;
}

// ─────────────────────────────────────────────
//  SEARCH — instant filter, pure JS
// ─────────────────────────────────────────────
function onSearch(q) {
  const dd = document.getElementById('dropdown');
  const ce = document.getElementById('countEntry');

  if (!q.trim()) {
    dd.style.display = 'none';
    ce.style.display = 'none';
    return;
  }

  const ql = q.toLowerCase();
  filtered = products.filter(p =>
    p['product name'].toLowerCase().includes(ql) ||
    p['product code'].toLowerCase().includes(ql)
  ).slice(0, 20); // max 20 results for performance

  if (!filtered.length) {
    dd.innerHTML = '<div class="drop-item"><div class="drop-name" style="color:#8A9BAE">No products found</div></div>';
    dd.style.display = 'block';
    ce.style.display = 'none';
    return;
  }

  dd.innerHTML = filtered.map((p, i) => `
    <div class="drop-item" onclick="selectProduct(${i})">
      <div class="drop-code">${p['product code']}</div>
      <div class="drop-name">${p['product name']}</div>
    </div>
  `).join('');
  dd.style.display = 'block';
}

// ─────────────────────────────────────────────
//  SELECT PRODUCT
// ─────────────────────────────────────────────
function selectProduct(filteredIdx) {
  const p = filtered[filteredIdx];
  // Find the real index in products array
  selected = products.findIndex(x => x['product code'] === p['product code']);

  // Close dropdown
  document.getElementById('dropdown').style.display = 'none';
  document.getElementById('searchInput').value = `${p['product code']} — ${p['product name']}`;

  // Show count entry
  showCountEntry(selected);
}

function showCountEntry(idx) {
  const p        = products[idx];
  const sysQty   = p['systems count'];
  const prevPhys = p['physical count'];
  const lastSaved = p['last_updated'] ? `⏱ Last saved: ${p['last_updated']}` : '';
  const diff     = prevPhys - sysQty;
  const cls      = diff > 0 ? 'pos' : diff < 0 ? 'neg' : '';
  const sign     = diff > 0 ? '+' : '';

  const ce = document.getElementById('countEntry');
  ce.style.display = 'block';
  ce.innerHTML = `
    <hr class="entry-divider">
    ${lastSaved ? `<div class="last-saved">${lastSaved}</div>` : ''}
    <div class="entry-row">
      <div class="entry-box">
        <div class="entry-label">System Qty</div>
        <div class="qty-display"><div class="qty-value">${sysQty}</div></div>
      </div>
      <div class="entry-box">
        <div class="entry-label">Physical Count</div>
        <input type="number" id="physInput" value="${prevPhys}" min="0"
               inputmode="numeric" oninput="onPhysInput(this.value, ${sysQty})">
      </div>
      <div class="entry-box">
        <div class="entry-label">Variance</div>
        <div class="variance-box ${cls}" id="vbox">
          <div id="varianceVal">${sign}${diff}</div>
        </div>
      </div>
    </div>
    <button id="saveBtn" onclick="saveCount(${idx})">💾  Save Count</button>
  `;

  // Auto-focus the input
  setTimeout(() => {
    const inp = document.getElementById('physInput');
    if (inp) { inp.focus(); inp.select(); }
  }, 50);
}

// ─────────────────────────────────────────────
//  INSTANT VARIANCE — pure JS, zero server
// ─────────────────────────────────────────────
function onPhysInput(val, sysQty) {
  const phys = parseInt(val) || 0;
  const diff = phys - sysQty;
  const sign = diff > 0 ? '+' : '';
  const vbox = document.getElementById('vbox');
  const vval = document.getElementById('varianceVal');

  vval.textContent = sign + diff;
  vbox.className = 'variance-box' + (diff > 0 ? ' pos' : diff < 0 ? ' neg' : '');
}

// ─────────────────────────────────────────────
//  SAVE COUNT — saves to localStorage instantly
// ─────────────────────────────────────────────
function saveCount(idx) {
  const inp  = document.getElementById('physInput');
  const phys = parseInt(inp.value) || 0;
  const sys  = products[idx]['systems count'];
  const diff = phys - sys;
  const now  = new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',second:'2-digit'});

  // Update in memory
  products[idx]['physical count'] = phys;
  products[idx]['difference']     = diff;
  products[idx]['last_updated']   = now;

  // Save to localStorage immediately — instant, offline
  localStorage.setItem('sc_data', JSON.stringify(products));
  saveCount_counter++;
  localStorage.setItem('sc_counter', saveCount_counter);

  // Visual feedback on button
  const btn = document.getElementById('saveBtn');
  btn.textContent = '✅ Saved!';
  btn.classList.add('saving');
  setTimeout(() => {
    btn.textContent = '💾  Save Count';
    btn.classList.remove('saving');
  }, 1200);

  // Update sync bar
  updateSyncBar();

  // Auto-sync every N counts
  if (saveCount_counter % SYNC_EVERY === 0) {
    syncToCloud(true);
  } else {
    const left = SYNC_EVERY - (saveCount_counter % SYNC_EVERY);
    showToast(`✅ ${products[idx]['product code']} saved · cloud sync in ${left}`);
  }

  // Refresh recent counts section only (not whole app — keeps search intact)
  refreshRecent();
}

// ─────────────────────────────────────────────
//  REFRESH RECENT (without full re-render)
// ─────────────────────────────────────────────
function refreshRecent() {
  // Update stats
  const total   = products.length;
  const counted = products.filter(p => p['last_updated'] !== '').length;
  const nVars   = products.filter(p => p['difference'] !== 0 && p['last_updated'] !== '').length;
  const pct     = total ? Math.round(counted / total * 100) : 0;

  const sv = document.querySelectorAll('.stat-value');
  if (sv[0]) sv[0].textContent = total;
  if (sv[1]) sv[1].textContent = counted;
  if (sv[2]) sv[2].textContent = nVars;

  const fill = document.querySelector('.progress-fill');
  const head = document.querySelector('.progress-head b');
  if (fill) fill.style.width = pct + '%';
  if (head) head.textContent = pct + '%';

  // Re-render recent list
  const recentHtml = renderRecent();
  // Find or create recent card
  const cards = document.querySelectorAll('.card');
  const lastCard = cards[cards.length - 1];
  if (lastCard && lastCard.querySelector('.recent-list')) {
    lastCard.outerHTML = recentHtml;
  } else if (recentHtml) {
    document.getElementById('mainContent').insertAdjacentHTML('beforeend', recentHtml);
  }
}

// ─────────────────────────────────────────────
//  SYNC TO CLOUD — POST directly to Supabase REST
//  Works from inside iframe, no Streamlit needed
// ─────────────────────────────────────────────
async function syncToCloud(auto = false) {
  const sid = localStorage.getItem('sc_sid') || (window.__SC_SID__ || '');
  if (!sid) return;

  setSyncStatus('syncing');
  const btn = document.getElementById('syncBtn');
  btn.textContent = '⏳ Syncing…';
  btn.disabled = true;

  try {
    const supabaseUrl = window.__SC_SUPABASE_URL__ || '';
    const supabaseKey = window.__SC_SUPABASE_KEY__ || '';
    const data        = JSON.stringify(products);
    const now         = new Date().toISOString().slice(0,16).replace('T',' ');
    const username    = window.__SC_USER__ || localStorage.getItem('sc_user') || '';
    const location    = window.__SC_LOCATION__ || localStorage.getItem('sc_location') || '';

    if (!supabaseUrl || !supabaseKey) {
      throw new Error('No Supabase credentials');
    }

    // Upsert directly to Supabase via REST API
    const resp = await fetch(`${supabaseUrl}/rest/v1/stock_sessions`, {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'apikey':        supabaseKey,
        'Authorization': `Bearer ${supabaseKey}`,
        'Prefer':        'resolution=merge-duplicates'
      },
      body: JSON.stringify({
        sid:      sid,
        username: username,
        location: location,
        data:     data,
        updated:  now
      }),
      signal: AbortSignal.timeout(10000)
    });

    if (resp.ok || resp.status === 201 || resp.status === 200) {
      saveCount_counter = 0;
      localStorage.setItem('sc_counter', '0');
      setSyncStatus('ok');
      showToast(auto ? '☁️ Auto-synced to cloud!' : '☁️ Synced to cloud!');
    } else {
      const err = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${err}`);
    }
  } catch(e) {
    setSyncStatus('offline');
    showToast('📵 Saved locally — will sync when connected');
    console.error('Sync error:', e);
  }

  btn.textContent = '☁️ Sync to Cloud';
  btn.disabled = false;
}

// ─────────────────────────────────────────────
//  SYNC BAR
// ─────────────────────────────────────────────
function updateSyncBar() {
  const pending = saveCount_counter % SYNC_EVERY;
  if (pending === 0 && saveCount_counter > 0) {
    setSyncStatus('ok');
  } else if (pending > 0) {
    setSyncStatus('pending', pending);
  } else {
    setSyncStatus('ok');
  }
}

function setSyncStatus(state, pending) {
  const el = document.getElementById('syncStatus');
  if (state === 'ok') {
    el.innerHTML = '<span class="sync-dot dot-ok"></span>All saved locally';
  } else if (state === 'pending') {
    const left = SYNC_EVERY - pending;
    el.innerHTML = `<span class="sync-dot dot-pending"></span>${pending} new · cloud sync in ${left}`;
  } else if (state === 'syncing') {
    el.innerHTML = '<span class="sync-dot dot-syncing"></span>Syncing to cloud…';
  } else if (state === 'offline') {
    el.innerHTML = '<span class="sync-dot dot-offline"></span>Offline · saved locally';
  }
}

// ─────────────────────────────────────────────
//  TOAST NOTIFICATION
// ─────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ─────────────────────────────────────────────
//  CLOSE DROPDOWN ON OUTSIDE CLICK
// ─────────────────────────────────────────────
document.addEventListener('click', (e) => {
  if (!e.target.closest('#dropdown') && !e.target.closest('#searchInput')) {
    document.getElementById('dropdown') && (document.getElementById('dropdown').style.display = 'none');
  }
});

// ─────────────────────────────────────────────
//  START
// ─────────────────────────────────────────────
init();
</script>
